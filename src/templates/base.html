<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>{% block title %}python_cicd{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <main class="container">
    {% block content %}{% endblock %}
  </main>

  {% if session.get('github_token') %}
    <div id="live-toast" class="live-toast" hidden></div>
    <script>
      (function () {
        var toast = document.getElementById('live-toast');
        var hideTimer = null;

        function showToast(text) {
          toast.textContent = text;
          toast.removeAttribute('hidden');
          if (hideTimer) clearTimeout(hideTimer);
          hideTimer = setTimeout(function () { toast.setAttribute('hidden', ''); }, 5000);
        }

        var source = new EventSource("{{ url_for('events_stream') }}");
        // 값을 받아서 toast에 표시, push 이벤트가 발생하면 repo_detail 페이지에서 커밋 내역을 새로고침
        source.onmessage = function (e) {
          var data;
          try {
            data = JSON.parse(e.data);
          } catch (err) {
            return;
          }

          showToast('실시간 이벤트: ' + (data.repo || '알 수 없는 저장소') + ' · ' + data.event);

          if (data.event === 'push') {
            if (window.__repoFullName && data.repo === window.__repoFullName) {
              window.__refreshCommits && window.__refreshCommits();
            }
            window.__moveRepoToTop && window.__moveRepoToTop(data.repo);
          }
        };
      })();
    </script>
  {% endif %}
</body>
</html>
